<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method Co · F&amp;B Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- jsdelivr pinned to 4.4.0 / 3.0.0 — cdnjs stopped serving the adapter
     bundle (404) which made every time-axis chart throw "complete date
     adapter" at init. jsdelivr has both files pinned and immutable. -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --white:#FFFFFF; --black:#231F20; --slate:#212931; --royal:#405766;
  --turquoise:#2BA6BB; --seafoam:#BCC8BE; --grey:#E2DEDE; --tan:#D8CFC4;
  --muted:#7A8591; --hover:#FAF9F8; --rule:#F0EDEC;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: "Gotham","Montserrat",-apple-system,BlinkMacSystemFont,sans-serif;
  color: var(--black); background: var(--white); -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
}
/* ======= App shell ======= */
.app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

/* ======= Sidebar ======= */
aside.nav {
  background: var(--slate); color: var(--white);
  padding: 32px 0 48px; position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.brand-block { padding: 0 28px 26px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.brand-eyebrow { font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase; color: var(--seafoam); font-weight: 500; }
.brand-title { font-size: 20px; font-weight: 300; letter-spacing: 0.02em; margin-top: 10px; line-height: 1.25; }
.brand-title b { font-weight: 600; }
.brand-sub { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--grey); margin-top: 6px; }

.nav-section { padding: 22px 28px 6px; }
.nav-title { font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--seafoam); font-weight: 600; }

.nav-group { padding: 0 16px; }
.nav-prop {
  padding: 14px 12px 6px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(226,222,222,0.6); font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; font-size: 13px; letter-spacing: 0.02em;
  color: rgba(255,255,255,0.85); cursor: pointer;
  border-left: 2px solid transparent; transition: all 0.12s ease;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.nav-item.active { background: rgba(43,166,187,0.12); border-left-color: var(--turquoise); color: var(--white); font-weight: 500; }
.nav-item.disabled { color: rgba(255,255,255,0.35); cursor: default; }
.nav-item.disabled:hover { background: transparent; }
.nav-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--turquoise); margin-left: 8px;
}
.nav-dot.none { background: rgba(255,255,255,0.15); }
.nav-outlet-picker { padding: 8px 16px 20px; }
.nav-outlet-picker select {
  width: 100%; background: rgba(255,255,255,0.06); color: var(--white);
  border: 1px solid rgba(255,255,255,0.14); border-radius: 2px;
  padding: 10px 12px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
  cursor: pointer;
}
.nav-outlet-picker select option { background: var(--slate); color: var(--white); }
.nav-outlet-picker select:hover { border-color: var(--turquoise); }
.nav-outlet-picker select option:disabled { color: rgba(255,255,255,0.4); }


/* ======= Main ======= */
main.main { min-width: 0; }

/* ======= Top header ======= */
.outlet-head {
  background: var(--white); padding: 32px 48px 24px;
  border-bottom: 1px solid var(--grey);
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;
}
.outlet-eyebrow { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--royal); font-weight: 500; }
.outlet-title { font-size: 30px; font-weight: 300; letter-spacing: 0.02em; line-height: 1.15; margin-top: 10px; color: var(--slate); }
.outlet-title b { font-weight: 600; }
.outlet-sub { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
.outlet-stamp { text-align: right; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.outlet-stamp .big { display: block; font-size: 12px; color: var(--slate); letter-spacing: 0.22em; margin-top: 4px; font-weight: 600; }
.outlet-property-select { display: flex; flex-direction: row; align-items: center; gap: 10px; }
.outlet-property-label { font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--royal); font-weight: 600; white-space: nowrap; }
.outlet-property-select select {
  min-width: 260px; background: var(--white); color: var(--black);
  border: 1px solid var(--grey); border-radius: 0;
  padding: 7px 12px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all 0.15s ease;
}
.outlet-property-select select option { background: var(--white); color: var(--black); }
.outlet-property-select select:hover { border-color: var(--royal); }
.outlet-property-select select option:disabled { color: rgba(0,0,0,0.3); }
.data-sources { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.ds-chip {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; padding: 4px 8px; border-radius: 2px;
  border: 1px solid var(--grey); color: var(--muted); font-weight: 500;
}
.ds-chip.on { background: var(--slate); color: var(--white); border-color: var(--slate); }

/* ======= Controls ======= */
.controls {
  background: var(--white); padding: 18px 48px; border-bottom: 1px solid var(--grey);
  display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 40;
}
.ctrl-group { display: flex; align-items: center; gap: 10px; }
.ctrl-label { font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--royal); font-weight: 600; }
select, button.pill {
  font-family: inherit; font-size: 11px; letter-spacing: 0.08em;
  padding: 7px 12px; border: 1px solid var(--grey); background: var(--white);
  color: var(--black); cursor: pointer; transition: all 0.15s ease;
  text-transform: uppercase; font-weight: 500;
}
select:hover, button.pill:hover { border-color: var(--royal); }
button.pill.active { background: var(--slate); color: var(--white); border-color: var(--slate); }
.period-group { display: inline-flex; gap: 3px; }

/* ======= Main content ======= */
.content { padding: 32px 48px 64px; max-width: none; }
section { margin-bottom: 40px; }
.sect-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--grey);
}
.sect-title { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--slate); font-weight: 600; }
.sect-meta { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.all-time { color: var(--turquoise); font-weight: 600; }

/* ======= KPI row ======= */
.kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--grey); border: 1px solid var(--grey); }
.kpi { background: var(--white); padding: 18px 18px; }
.kpi .label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.kpi .val { font-size: 24px; font-weight: 300; letter-spacing: -0.01em; color: var(--black); margin-top: 8px; font-variant-numeric: tabular-nums; }
.kpi .yoy { font-size: 10px; margin-top: 8px; letter-spacing: 0.05em; font-weight: 500; }
.kpi .yoy.pos { color: #2a7f56; }
.kpi .yoy.neg { color: #a04242; }
.kpi .yoy.neutral { color: var(--muted); }

/* ======= Cards ======= */
.grid { display: grid; gap: 20px; }
.grid-2 { grid-template-columns: 2fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-2eq { grid-template-columns: 1fr 1fr; }
.card {
  background: var(--white); border: 1px solid var(--grey); padding: 20px 22px 18px;
}
.card h3 { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--royal); font-weight: 600; margin-bottom: 4px; }
.card .desc { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
.chart-wrap { position: relative; height: 270px; }
.chart-wrap.tall { height: 320px; }
.empty-chart { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; color: var(--muted); font-size: 12px; text-align: center; padding: 20px; background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(191,185,182,0.18) 8px, rgba(191,185,182,0.18) 16px); border: 1px dashed var(--grey); }
.empty-chart .empty-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--royal); font-weight: 600; }
.empty-chart .empty-sub { font-size: 11px; color: var(--muted); max-width: 320px; }

/* ======= Section chips / tags (period vs all-time) ======= */
.period-chip, .alltime-chip { display: inline-block; margin-left: 10px; padding: 2px 8px; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; border-radius: 2px; vertical-align: middle; }
.period-chip { background: var(--royal); color: var(--white); }
.alltime-chip { background: var(--tan); color: var(--slate); border: 1px solid var(--grey); }
.alltime-tag { display: inline-block; margin-left: 8px; padding: 1px 6px; font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; color: var(--muted); background: var(--hover); border: 1px solid var(--rule); border-radius: 2px; vertical-align: middle; }
.sect-meta.all-time { font-style: italic; color: var(--muted); font-size: 11px; max-width: 620px; }

/* ======= Tables ======= */
table { width: 100%; border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
table th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--grey); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
table td { padding: 8px 10px; border-bottom: 1px solid var(--rule); }
table td.num { text-align: right; }
table tr:hover td { background: var(--hover); }
table tr.total td { font-weight: 600; border-top: 1px solid var(--royal); border-bottom: none; background: var(--grey); }

/* ======= Heatmap ======= */
.heatmap { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 2px; font-size: 11px; }
.heatmap .h-cell { padding: 6px 4px; text-align: center; color: var(--white); font-variant-numeric: tabular-nums; font-weight: 500; }
.heatmap .h-lbl { color: var(--muted); padding: 6px 4px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; text-align: right; }
.heatmap .h-top { color: var(--slate); font-weight: 600; text-align: center; padding: 6px 4px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

/* ======= Empty / placeholder ======= */
.placeholder {
  padding: 80px 40px; text-align: center; border: 1px dashed var(--grey);
  color: var(--muted); letter-spacing: 0.08em;
}
.placeholder h3 { font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--royal); margin-bottom: 10px; font-weight: 600; }
.placeholder p { font-size: 12px; max-width: 520px; margin: 0 auto; line-height: 1.6; }

/* ======= Footer ======= */
footer.foot { padding: 20px 48px; text-align: center; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); border-top: 1px solid var(--grey); background: #FAF9F8; }
footer.foot b { color: var(--slate); }

/* ======= Responsive ======= */
@media (max-width: 1100px) {
  .app { grid-template-columns: 1fr; }
  aside.nav { position: relative; height: auto; }
  .kpis { grid-template-columns: repeat(3, 1fr); }
  .grid-2, .grid-3, .grid-2eq { grid-template-columns: 1fr; }
  .outlet-head, .controls, .content, footer.foot { padding-left: 24px; padding-right: 24px; }
}
</style>
</head>

<div class="content" id="outletBody"></div>

<footer class="foot">

</main>

// ================================================== Utils
const fmtMoney = v => { if (v == null || isNaN(v)) return '—'; const a=Math.abs(v); if (a>=1e6) return '$'+(v/1e6).toFixed(2)+'M'; if (a>=1e3) return '$'+(v/1e3).toFixed(1)+'K'; return '$'+v.toFixed(0); };
const fmtMoneyFull = v => v == null ? '—' : '$' + Math.round(v).toLocaleString();
const fmtNum = v => v == null ? '—' : Math.round(v).toLocaleString();
const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtMonth = m => { if (!m) return ''; const s = String(m); const y = s.slice(0,4); const mm = +s.slice(5,7); return (MONTH_ABBR[mm-1]||'')+' '+y; };
const fmtPct = v => v == null ? '—' : v.toFixed(1) + '%';
const fmtYoY = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

// ================================================== State
// weekEnd: optional ISO date (YYYY-MM-DD, always a Sunday) narrowing the Month
// filter to a single Mon..Sun 7-day window. When set, periodBounds returns
// that week; the selector is scoped to weeks whose WE-Sunday falls in monthJump.
let STATE = { outlet: 'lsbr', section: 'summary', rc: 'combined', gran: 'D', monthJump: '', weekEnd: '', compare: 'STLY' };
let charts = {};

// ================================================== Outlet metadata (seats + hours for RevPASH)
// Kept outside the DATA payload so we can edit without touching the large JSON blob.
// seasonal_months are inclusive (1=Jan .. 12=Dec). Outdoor seats only count inside that window.
// hours_per_day is the daily operating-hour count used for RevPASH denominator.
const OUTLET_META = {
  lsbr: {
    seasonal_months: [4,5,6,7,8,9], // Apr–Sept outdoor
    rc: {
      // Le Suprême hours from lesupremedetroit.com: Mon–Thu 4–10p, Fri 4–11p,
      // Sat 10a–2:30p + 4–11p, Sun 10a–2:30p + 4–9p → 52 hrs/wk ÷ 7 = 7.4 hrs/day
      le_supreme:  { seats_base: 161, seats_seasonal: 44, hours_per_day: 7.4 },
      // Bar Rotunda hours from barrotunda.com: Sun–Thu 7a–11p, Fri–Sat 7a–1a
      // → 116 hrs/wk ÷ 7 = 16.6 hrs/day
      bar_rotunda: { seats_base: 70,  seats_seasonal: 0,  hours_per_day: 16.6 }  // 20 bar + 50 lounge
    }
  }
};
// Returns total available seats for the selected RC and month (YYYY-MM or null)
function seatsForMonth(outletId, rcKey, monthStr) {
  const meta = OUTLET_META[outletId]; if (!meta) return null;
  const seasonal = meta.seasonal_months || [];
  const monthNum = monthStr ? +monthStr.slice(5,7) : null;
  const seasonalOn = monthNum ? seasonal.includes(monthNum) : true;
  const rcs = meta.rc || {};
  if (rcKey === 'combined' || !rcs[rcKey]) {
    return Object.values(rcs).reduce((a,r)=> a + (r.seats_base||0) + (seasonalOn ? (r.seats_seasonal||0) : 0), 0);
  }
  const r = rcs[rcKey];
  return (r.seats_base||0) + (seasonalOn ? (r.seats_seasonal||0) : 0);
}
// Seat-hours per day — the proper RevPASH denominator component.
// For combined RC, sums seat-hours across each individual RC (NOT seats × avg-hours).
function seatHoursPerDay(outletId, rcKey, monthStr) {
  const meta = OUTLET_META[outletId]; if (!meta) return null;
  const seasonal = meta.seasonal_months || [];
  const monthNum = monthStr ? +monthStr.slice(5,7) : null;
  const seasonalOn = monthNum ? seasonal.includes(monthNum) : true;
  const rcs = meta.rc || {};
  const rcSeatHours = r => {
    const seats = (r.seats_base||0) + (seasonalOn ? (r.seats_seasonal||0) : 0);
    const h = r.hours_per_day;
    return (h == null) ? null : seats * h;
  };
  if (rcKey === 'combined' || !rcs[rcKey]) {
    const vals = Object.values(rcs).map(rcSeatHours);
    if (vals.some(v => v == null)) return null;
    return vals.reduce((a,b)=>a+b,0);
  }
  return rcSeatHours(rcs[rcKey]);
}
// Thin accessor for display ("X hrs/day")
function hoursPerDayFor(outletId, rcKey) {
  const meta = OUTLET_META[outletId]; if (!meta) return null;
  const rcs = meta.rc || {};

// ================================================== Period (Month-first, Week-second)
// Primary filter is Month — if set, bounds = that calendar month.
// Secondary filter is Week Ending (WE-Sunday) — narrows to Mon..Sun of that week.
// If no monthJump, default to the latest full month of data.
function isoLocal(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
// Given "YYYY-MM", return array of {we, start, end, label, sublabel} for each
// week whose Sunday-ending date lands in that month. Week runs Mon..Sun.
// Example for 2026-04: WE 4/5, 4/12, 4/19, 4/26.
function weekEndsInMonth(ym) {
  if (!ym) return [];
  const y = +ym.slice(0,4), m = +ym.slice(5,7);
  const monthEnd = new Date(y, m, 0); // last day of month
  const firstDow = new Date(y, m-1, 1).getDay(); // 0=Sun
  const firstSunDay = 1 + ((7 - firstDow) % 7); // day-of-month of first Sunday
  const out = [];
  for (let day = firstSunDay; day <= monthEnd.getDate(); day += 7) {
    const endDt = new Date(y, m-1, day);
    const startDt = new Date(y, m-1, day - 6);
    const mo = (d) => d.getMonth()+1;
    const label = `WE ${mo(endDt)}/${endDt.getDate()}`;
    const sublabel = `${mo(startDt)}/${startDt.getDate()} – ${mo(endDt)}/${endDt.getDate()}`;
    out.push({ we: isoLocal(endDt), start: isoLocal(startDt), end: isoLocal(endDt), label, sublabel });
  }
  return out;
}
function periodBounds(maxDate) {
  // Week Ending wins if set and valid for the current month
  if (STATE.monthJump && STATE.weekEnd) {
    const weeks = weekEndsInMonth(STATE.monthJump);
    const hit = weeks.find(w => w.we === STATE.weekEnd);
    if (hit) return { start: hit.start, end: hit.end, kind: 'week', we: hit.we, label: hit.label, sublabel: hit.sublabel };
  }
  if (STATE.monthJump) {
    const m = STATE.monthJump; const y=+m.slice(0,4), mm=+m.slice(5,7);
    const last = isoLocal(new Date(y, mm, 0));
    return { start: m + '-01', end: last, kind: 'month' };
  }
  // Default to the most recent month present in data
  if (!maxDate) return null;
  const m = maxDate.slice(0,7);
  const y=+m.slice(0,4), mm=+m.slice(5,7);
  const last = isoLocal(new Date(y, mm, 0));
  return { start: m + '-01', end: last, kind: 'month' };
}
// Canonical period label used in section heads, KPIs and chart subs.
// Week-level: "Wk ending 4/5 · Mar 30 – Apr 5 2026"
// Month-level: "Apr 2026"  (or "Latest Month" if no month selected)
function currentPeriodLabel() {
  if (STATE.monthJump && STATE.weekEnd) {
    const weeks = weekEndsInMonth(STATE.monthJump);
    const hit = weeks.find(w => w.we === STATE.weekEnd);
    if (hit) return `${hit.label} · ${hit.sublabel}`;
  }
  return STATE.monthJump ? fmtMonth(STATE.monthJump) : 'Latest Month';
}
// Comparison baseline — LM = last calendar month, STLY = same month prior year,
// T90 = 90 days prior to current bounds.start, BUDGET = null (data not yet wired)
function compareBounds(b) {
  if (!b || !b.start) return null;
  const mode = STATE.compare || 'STLY';
  const iso = dt => dt.toISOString().slice(0,10);
  if (mode === 'STLY') {
    // Week mode: shift by exactly 364 days (52 × 7) so Mon→Mon and Sun→Sun.
    // Example: WE 1/4/2026 (Mon 12/29/25 – Sun 1/4/26) maps to
    //          WE 1/5/2025 (Mon 12/30/24 – Sun 1/5/25). Apples-to-apples week.
    if (b.kind === 'week') {
      const shift364 = s => { const dt=new Date(s+'T12:00:00'); dt.setDate(dt.getDate()-364); return iso(dt); };
      return { start: shift364(b.start), end: shift364(b.end), label: 'STLY (Wk)' };
    }
    // Month / default: same calendar dates, prior year
    const shift = s => { const dt=new Date(s+'T12:00:00'); dt.setFullYear(dt.getFullYear()-1); return iso(dt); };
    return { start: shift(b.start), end: shift(b.end), label: 'STLY' };
  }
  if (mode === 'LM') {
    // If viewing a single week, "LM" shifts 28 days back (same DOW, ~4 weeks prior)
    if (b.kind === 'week') {
      const shift28 = s => { const dt=new Date(s+'T12:00:00'); dt.setDate(dt.getDate()-28); return iso(dt); };
      return { start: shift28(b.start), end: shift28(b.end), label: 'Prior Wk (–28d)' };
    }
    const startDt = new Date(b.start + 'T12:00:00');
    const prevEnd = new Date(startDt.getFullYear(), startDt.getMonth(), 0);
    const prevStart = new Date(prevEnd.getFullYear(), prevEnd.getMonth(), 1);
    return { start: iso(prevStart), end: iso(prevEnd), label: 'LM' };
  }
  if (mode === 'T90') {
    const startDt = new Date(b.start + 'T12:00:00');
    const end = new Date(startDt); end.setDate(end.getDate()-1);
    const start = new Date(end); start.setDate(start.getDate()-89);
    return { start: iso(start), end: iso(end), label: 'T90' };
  }
  return null; // BUDGET or unknown
}
// Kept for legacy charts that overlay "prior year" (e.g. the Net Sales Trend).
// DOW-aligned when viewing a single week so the overlay lines up Mon-to-Mon.
function priorYearBounds(b) {
  if (!b || !b.start) return null;
  const iso = dt => dt.toISOString().slice(0,10);
  if (b.kind === 'week') {
    const shift364 = s => { const dt=new Date(s+'T12:00:00'); dt.setDate(dt.getDate()-364); return iso(dt); };
    return { start: shift364(b.start), end: shift364(b.end) };
  }
  const shift = s => { const dt=new Date(s+'T12:00:00'); dt.setFullYear(dt.getFullYear()-1); return iso(dt); };
  return { start: shift(b.start), end: shift(b.end) };
}
function filter(rows, b) { if (!b||!b.start) return rows; return rows.filter(r => r.date >= b.start && r.date <= b.end); }
function sumDaily(rows, fields=['net_sales','orders','guests']) {
  const out = {}; fields.forEach(f => out[f]=0);
  rows.forEach(r => fields.forEach(f => out[f] += r[f]||0));
  if (fields.includes('net_sales') && out.orders) out.check_avg = out.net_sales/out.orders;
  if (fields.includes('net_sales') && out.guests) out.ppa = out.net_sales/out.guests;

function weekStart(d) { const dt = new Date(d + 'T12:00:00'); const toMon = (dt.getDay()+6)%7; dt.setDate(dt.getDate()-toMon); return dt.toISOString().slice(0,10); }

  if (gran === 'D') return rows;
  const map = {};
  rows.forEach(r => {
    const k = gran === 'W' ? weekStart(r.date) : r.date.slice(0,7);
    if (!map[k]) { map[k] = { date: k }; fields.forEach(f => map[k][f] = 0); }
    fields.forEach(f => map[k][f] += r[f]||0);
  });
  return Object.values(map).sort((a,b) => a.date < b.date ? -1 : 1);

function renderEverything() {
  const o = DATA.outlets[STATE.outlet];

  // === Sales Summary-driven ===
  const ssDaily = combinedDailySales();
  const maxDateSS = ssDaily.length ? ssDaily[ssDaily.length-1].date : null;
  const bSS = maxDateSS ? periodBounds(maxDateSS) : null;
  const pySS = bSS ? priorYearBounds(bSS) : null;
  const curSSRows = bSS ? filter(ssDaily, bSS) : ssDaily;
  const pySSRows  = pySS ? filter(ssDaily, pySS) : null;

  // === Order Details-driven ===
  const odDaily = combinedDailyOrders();
  const maxDateOD = odDaily.length ? odDaily[odDaily.length-1].date : null;
  const bOD = maxDateOD ? periodBounds(maxDateOD) : null;
  const pyOD = bOD ? priorYearBounds(bOD) : null;
  const curODRows = bOD ? filter(odDaily, bOD) : odDaily;
  const pyODRows  = pyOD ? filter(odDaily, pyOD) : null;

  // Fire each render inside its own try/catch so one failure can't blank the rest.
  const guard = (name, fn) => { try { fn(); } catch (e) { console.error('[revenue:'+name+']', e); } };

  // KPIs: prefer order-details when we have them (named servers, more granular)
  guard('kpis', () => renderKPIs(curSSRows, pySSRows, bSS, curODRows, pyODRows));

  guard('trend',   () => renderTrend(curSSRows, pySSRows));
  guard('dow',     () => renderDOW(curSSRows));
  guard('cat',     () => renderCategory());
  guard('daypart', () => renderDaypart());
  guard('mode',    () => renderMode());
  guard('hour',    () => renderHour());
  guard('rc',      () => renderRC());
  guard('heatmap', () => renderHeatmap());
  // Monthly Comparison is a multi-month trend; if we're filtered to a single
  // week, fall back to the full monthly rollup so the chart remains useful.
  guard('monthly', () => renderMonthly(bSS && bSS.kind === 'week' ? null : curODRows));
  guard('tipHist', () => renderTipHist());
  guard('discTrend', () => renderDiscountTrend(curODRows));
  guard('servers', () => renderServers());
  guard('tables',  () => renderTablesTable());
  guard('payments', () => renderPayments());
  guard('dining',  () => renderDiningOptions());
  guard('productMix', () => renderProductMix());

  const lbl = bSS && bSS.start
    ? bSS.start + ' → ' + bSS.end + (pySS ? '  vs  ' + pySS.start + ' → ' + pySS.end : '')
    : 'All available dates';
  document.getElementById('trendMeta').textContent = lbl;
  const ordLbl = bOD && bOD.start
    ? bOD.start + ' → ' + bOD.end + (pyOD ? '  vs  ' + pyOD.start + ' → ' + pyOD.end : '')
    : 'Jan 2025 – Mar 2026';
  document.getElementById('orderMeta').textContent = 'Toast Order Details · ' + ordLbl;
}

function yoy(cur, py) { if (py == null || py === 0) return null; return (cur-py)/py*100; }

function renderKPIs(curSS, pySS, bSS, curOD, pyOD) {
  // ===== Current-period metrics (Sales Summary for net/guests; Order Details for discounts) =====
  const cs = sumDaily(curSS);
  const guestAvg = cs.guests ? cs.net_sales / cs.guests : null;

  // Order-details driven: comps + discounts %
  const co = (curOD||[]).reduce((a,r)=>({amount:a.amount+(r.amount||0), tip:a.tip+(r.tip||0), disc:a.disc+(r.discount||0)}), {amount:0, tip:0, disc:0});
  // Comps & Discounts % = discount $ / gross (net + discounts)
  const compDiscPct = (co.amount + co.disc) ? co.disc/(co.amount + co.disc)*100 : null;

  // ===== RevPASH — Net Sales ÷ (seat-hours across open days) =====
  // For combined RC, seat-hours per day = Σ(seats × hours) across each RC (NOT seats × avg-hrs).
  const monthStr = bSS && bSS.start ? bSS.start.slice(0,7) : null;
  const seats = seatsForMonth(STATE.outlet, STATE.rc, monthStr);
  const hoursPerDay = hoursPerDayFor(STATE.outlet, STATE.rc);
  const shPerDay = seatHoursPerDay(STATE.outlet, STATE.rc, monthStr);
  const openDays = (curSS||[]).filter(r => (r.net_sales||0) > 0).length;
  const revPASH = (shPerDay && openDays && cs.net_sales)
    ? cs.net_sales / (shPerDay * openDays) : null;
  let revPashSub;
  if (revPASH != null) {
    revPashSub = `${seats} seats · ${hoursPerDay} hr/day · ${openDays} open days`;
  } else if (seats && !hoursPerDay) {
    revPashSub = `${seats} seats · need service hours`;
  } else if (!seats) {
    revPashSub = 'Need seat count';
  } else {
    revPashSub = 'Need seats + hours';
  }

  // ===== Comparison baseline (LM / STLY / T90 / BUDGET) =====
  const cmp = compareBounds(bSS);
  const cmpMode = STATE.compare || 'STLY';
  const cmpLabelShort = ({LM:'vs LM', STLY:'vs STLY', T90:'vs T90 Avg', BUDGET:'vs Budget'})[cmpMode] || 'vs Prior';

  // Pull the comparison slice from the full daily set (used for all period compares except Budget)
  let cmpSS = null;
  if (cmpMode !== 'BUDGET' && cmp) {
    const full = combinedDailySales();
    cmpSS = filter(full, cmp);
  }
  // For T90, scale the 90-day window to the selected period length (daily avg × period days)
  let cmpSum = null;
  if (cmpSS && cmpSS.length) {
    const raw = sumDaily(cmpSS);
    if (cmpMode === 'T90') {
      const periodDays = Math.max(1, (curSS||[]).length);
      const cmpDays = Math.max(1, cmpSS.length);
      const s = periodDays / cmpDays;
      cmpSum = {
        net_sales: raw.net_sales * s,
        guests: raw.guests * s,
        orders: raw.orders * s
      };
    } else {
      cmpSum = raw;
    }
    cmpSum.guestAvg = cmpSum.guests ? cmpSum.net_sales / cmpSum.guests : null;
  }
  // Comparison comps & discounts %
  let cmpCompDiscPct = null;
  if (cmpMode !== 'BUDGET' && cmp) {
    const fullOD = combinedDailyOrders();
    const cmpOD = filter(fullOD, cmp);
    const cco = cmpOD.reduce((a,r)=>({amount:a.amount+(r.amount||0), disc:a.disc+(r.discount||0)}), {amount:0, disc:0});
    cmpCompDiscPct = (cco.amount + cco.disc) ? cco.disc/(cco.amount + cco.disc)*100 : null;
  }

  // ===== Avg Ticket Time =====
  // Sourced from Toast ordersBulk (check.paidDate - check.openedDate). ETL
  // emits ticket_time_sec_sum + ticket_time_count on each daily row so we can
  // compute a weighted avg across any period slice without precision loss.
  const ticketAgg = (curOD||[]).reduce(
    (a,r) => ({ sec: a.sec + (r.ticket_time_sec_sum||0), cnt: a.cnt + (r.ticket_time_count||0) }),
    { sec: 0, cnt: 0 }
  );
  const avgTicketMin = ticketAgg.cnt ? (ticketAgg.sec / ticketAgg.cnt / 60) : null;
  let cmpTicketMin = null;
  if (cmpMode !== 'BUDGET' && cmp) {
    const fullOD2 = combinedDailyOrders();
    const cmpODt = filter(fullOD2, cmp);
    const cmpTAgg = cmpODt.reduce(
      (a,r) => ({ sec: a.sec + (r.ticket_time_sec_sum||0), cnt: a.cnt + (r.ticket_time_count||0) }),
      { sec: 0, cnt: 0 }
    );
    if (cmpTAgg.cnt) cmpTicketMin = cmpTAgg.sec / cmpTAgg.cnt / 60;
  }
  const ticketSub = avgTicketMin != null
    ? `${fmtNum(ticketAgg.cnt)} tickets · open→paid`
    : 'awaiting Toast order-details sync';

  // ===== Build six KPI cards =====
  const cards = [
    {
      label: 'Net Sales',
      val: fmtMoneyFull(cs.net_sales),
      delta: cmpSum ? yoy(cs.net_sales, cmpSum.net_sales) : null,
      sub: cmpMode === 'BUDGET' ? 'Budget not wired' : null
    },
    {
      label: 'Guests',
      val: fmtNum(cs.guests),
      delta: cmpSum ? yoy(cs.guests, cmpSum.guests) : null,
      sub: cmpMode === 'BUDGET' ? 'Budget not wired' : null
    },
    {
      label: 'Guest Avg',
      val: guestAvg != null ? '$' + guestAvg.toFixed(2) : '—',
      delta: (cmpSum && cmpSum.guestAvg) ? yoy(guestAvg, cmpSum.guestAvg) : null,
      sub: cmpMode === 'BUDGET' ? 'Budget not wired' : 'Net ÷ Guests'
    },
    {
      label: 'Comps & Discounts %',
      val: compDiscPct == null ? '—' : fmtPct(compDiscPct),
      delta: (cmpCompDiscPct != null && compDiscPct != null) ? (compDiscPct - cmpCompDiscPct) : null,
      deltaUnit: 'pp',
      sub: compDiscPct == null ? 'awaiting Order Details' : fmtMoneyFull(co.disc) + ' in comps'
    },
    {
      label: 'RevPASH',
      val: revPASH != null ? '$' + revPASH.toFixed(2) : '—',
      delta: null,
      sub: revPashSub
    },
    {
      label: 'Avg Ticket Time',
      val: avgTicketMin != null ? avgTicketMin.toFixed(1) + ' min' : '—',
      // Ticket-time delta: lower is better, so invert sign for visual cue (green if shorter).
      delta: (avgTicketMin != null && cmpTicketMin != null) ? -(avgTicketMin - cmpTicketMin) : null,
      deltaUnit: 'min',
      sub: ticketSub
    }
  ];
  document.getElementById('kpiRow').innerHTML = cards.map(c => {
    let deltaHtml = '&nbsp;';
    if (c.delta != null) {
      const cls = c.delta >= 0 ? 'pos' : 'neg';
      let unit;
      if (c.deltaUnit === 'pp') {
        unit = (c.delta>=0?'+':'') + c.delta.toFixed(1) + 'pp';
      } else if (c.deltaUnit === 'min') {
        unit = (c.delta>=0?'+':'') + c.delta.toFixed(1) + ' min';
      } else {
        unit = fmtYoY(c.delta);
      }
      deltaHtml = `<span class="yoy ${cls}">${cmpLabelShort} ${unit}</span>`;
    } else if (c.sub) {
      deltaHtml = `<span class="yoy neutral">${c.sub}</span>`;
    }
    return `<div class="kpi"><div class="label">${c.label}</div><div class="val">${c.val}</div><div>${deltaHtml}</div></div>`;

function renderHeatmap() {
  const cont = document.getElementById('heatmapContainer');
  if (!cont) return;
  try {
    const src = getOrderDetailsSource();
    if (!src) { cont.innerHTML = '<div class="placeholder" style="padding:40px"><p>No order-detail data for this revenue center.</p></div>'; return; }
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const cells = {}; let max = 0;
    Object.values(src).forEach(od => (od.hour_dow||[]).forEach(r => {
      const k = r.hour + '|' + r.dow;
      cells[k] = (cells[k]||0) + r.amount;
      if (cells[k] > max) max = cells[k];
    }));
    if (!max) { cont.innerHTML = '<div class="placeholder" style="padding:40px"><p>No hour-of-week activity recorded yet.</p></div>'; return; }
    // hours with >= 1% of max total to trim quiet hours
    const hoursSet = new Set(); Object.keys(cells).forEach(k => hoursSet.add(+k.split('|')[0]));
    const hours = Array.from(hoursSet).filter(h => {
      const total = days.reduce((a,d) => a + (cells[h+'|'+d]||0), 0);
      return total / max >= 0.01;
    }).sort((a,b)=>a-b);
    const lbl = h => (h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM');
    let html = '<div class="heatmap"><div class="h-top"></div>' + days.map(d => `<div class="h-top">${d}</div>`).join('');
    hours.forEach(h => {
      html += `<div class="h-lbl">${lbl(h)}</div>`;
      days.forEach(d => {
        const v = cells[h+'|'+d] || 0;
        const t = max ? v/max : 0;
        const alpha = 0.06 + t*0.94;
        html += `<div class="h-cell" style="background: rgba(33,41,49,${alpha.toFixed(2)}); color: ${t>0.45?'#fff':'#231F20'};">${v===0?'':fmtMoney(v)}</div>`;
      });
    });
    html += '</div>';
    cont.innerHTML = html;
  } catch (e) {
    console.error('[heatmap]', e);
    cont.innerHTML = '<div class="placeholder" style="padding:40px"><p>Heatmap unavailable — see console.</p></div>';
  }
}

  const o = DATA.outlets[STATE.outlet];
  if (!o.product_mix) return null;
  if (STATE.rc === 'bar_rotunda') return o.product_mix.bar_rotunda;
  if (STATE.rc === 'le_supreme') return o.product_mix.le_supreme;
  return o.product_mix.combined;
}

function renderProductMix() {
  const pm = getProductMixSource();
  const kpiEl = document.getElementById('pmixKPIs');
  if (!pm) { if (kpiEl) kpiEl.innerHTML = ''; return; }

  // ---- KPIs ----
  const t = pm.totals;
  const tbl = [
    ['Items Sold', fmtNum(t.qty), '# units'],
    ['Net Sales', fmtMoney(t.net), 'Gross minus discounts & voids'],
    ['Avg Price', '$' + (t.avg_price||0).toFixed(2), 'Gross ÷ qty'],
    ['Menu Groups', fmtNum((pm.menu_groups||[]).length), 'Distinct'],
    ['Items Ranked', fmtNum((pm.items_top||[]).length), 'Top list'],
  ];
  kpiEl.innerHTML = tbl.map(([k,v,d]) => `<div class="kpi"><div class="kpi-label">${k}</div><div class="kpi-value">${v}</div><div class="kpi-sub">${d}</div></div>`).join('');

  // ---- Categories ----
  destroy('pmixCat');
  const cats = (pm.categories||[]).filter(c => c.net > 0).slice(0, 10);
  charts.pmixCat = new Chart(document.getElementById('pmixCatChart'), {
    type: 'doughnut',
    data: {
      labels: cats.map(c => c.category),
      datasets: [{ data: cats.map(c => c.net), backgroundColor: PALETTE_MANY, borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: c => c.label + ': ' + fmtMoney(c.raw) } } } }
  });

  // ---- Menus ----
  destroy('pmixMenu');
  const menus = (pm.menus||[]).filter(m => m.net > 0).slice(0, 8);
  charts.pmixMenu = new Chart(document.getElementById('pmixMenuChart'), {
    type: 'bar',
    data: {
      labels: menus.map(m => m.menu),
      datasets: [{ label: 'Net Sales', data: menus.map(m => m.net), backgroundColor: '#2BA6BB', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmtMoney(c.raw) } } },
      scales: { x: { ticks: { callback: v => fmtMoney(v) } } }
    }
  });

  // ---- Top 20 Menu Groups ----
  destroy('pmixGroups');
  const groups = (pm.menu_groups||[]).slice(0, 20);
  charts.pmixGroups = new Chart(document.getElementById('pmixGroupsChart'), {
    type: 'bar',
    data: {
      labels: groups.map(g => g.menu_group),
      datasets: [{ label: 'Net Sales', data: groups.map(g => g.net), backgroundColor: '#212931', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmtMoney(c.raw) + ' · ' + fmtNum(groups[c.dataIndex].qty) + ' sold' } } },
      scales: { x: { ticks: { callback: v => fmtMoney(v) } } }
    }
  });

  // ---- Top 25 Items by Net ----
  const totNet = pm.totals.net || 1;
  const byNet = (pm.items_top||[]).slice(0, 25);
  document.querySelector('#pmixItemsTable tbody').innerHTML = byNet.map((it, i) =>
    `<tr><td>${i+1}</td><td>${it.item}</td><td>${it.category||'—'}</td><td class="num">${fmtNum(it.qty)}</td><td class="num">$${(it.avg_price||0).toFixed(2)}</td><td class="num">${fmtMoney(it.net)}</td><td class="num">${fmtPct(it.net/totNet*100)}</td></tr>`
  ).join('');

  // ---- Top 25 Items by Qty ----
  const byQty = (pm.items_top||[]).slice().sort((a,b) => (b.qty||0) - (a.qty||0)).slice(0, 25);
  document.querySelector('#pmixItemsQtyTable tbody').innerHTML = byQty.map((it, i) =>
    `<tr><td>${i+1}</td><td>${it.item}</td><td>${it.category||'—'}</td><td class="num">${fmtNum(it.qty)}</td><td class="num">$${(it.avg_price||0).toFixed(2)}</td><td class="num">${fmtMoney(it.net)}</td></tr>`
  ).join('');
}

// ================================================== Section dispatcher — re-renders whichever Nav section is active
function rerenderSection() {
  destroyAll();
  const o = DATA.outlets[STATE.outlet];
  if (o && o.placeholder) return;  // nothing to re-render
  if (STATE.section === 'summary')  return renderSummarySection();
  // Rebuild Revenue HTML on every rerender so canvases are always fresh —
  // some Chart.js 4.4 time-axis edge cases fail silently when a canvas had
  // its `display` toggled off/on in the same tick by showEmpty/safeChart.
  if (STATE.section === 'revenue')  return renderRevenueSection();
  if (STATE.section === 'labor')    return renderPlaceholderSection('Labor', 'Awaiting 7shifts payroll &amp; schedule export. Once connected, this section will show labor hours, labor % of net, SPMH, role mix, overtime, and scheduled-vs-actual variance.', ['labor']);
  if (STATE.section === 'events')   return renderPlaceholderSection('Private Events', 'Awaiting Tripleseat booking export. Once connected, this section will show events booked, gross & net F&amp;B, average per event, guest counts, lead time, and conversion by event type.', ['tripleseat']);
  if (STATE.section === 'guest')    return renderPlaceholderSection('Guest Experience', 'Awaiting Resy surveys &amp; ratings. Once connected, this section will show NPS, star rating distribution, response rate, server performance, guest comments and sentiment.', ['resy']);
}

// ================================================== Wire up
document.getElementById('rcFilter').addEventListener('change', e => { STATE.rc = e.target.value; rerenderSection(); });
document.getElementById('granFilter').addEventListener('change', e => { STATE.gran = e.target.value; rerenderSection(); });
document.getElementById('monthJump').addEventListener('change', e => {
  STATE.monthJump = e.target.value;
  // Month changed → week selection no longer applies; always reset to "All weeks"
  // and refresh the WE dropdown with the new month's Sunday-ending dates.
  STATE.weekEnd = '';
  populateWeekEndFilter();
  rerenderSection();
});
document.getElementById('weekEndFilter').addEventListener('change', e => {
  STATE.weekEnd = e.target.value || '';
  rerenderSection();
});
document.getElementById('compareFilter').addEventListener('change', e => {
  STATE.compare = e.target.value;
  rerenderSection();
});

// Init
renderNav();
renderOutlet();
</script>
</body>
</html>
