name: Toast Sync

# Nightly pull of Toast orders for each configured outlet.
# Commits refreshed data/<outlet>.json back to the repo so the dashboard
# on GitHub Pages can fetch it statically.

on:
  schedule:
    # 07:15 UTC = 03:15 ET. After US East close-of-business, before AM traffic.
    - cron: '15 7 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window (days). 400 = ~13 months for YoY.'
        required: false
        default: '400'
      outlet:
        description: 'Optional single outlet id to sync (leave blank = all).'
        required: false
        default: ''

permissions:
  contents: write  # needed to commit regenerated JSON

concurrency:
  group: toast-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Bumped from 45 → 180 because initial seed (DAYS_BACK=400, ~14 outlets)
    # needs ~60–90 min against Toast ordersBulk rate limits. Nightly incremental
    # runs finish in under 10 min, so the larger cap is harmless.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: toast-etl/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r toast-etl/requirements.txt

      - name: Run Toast sync
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_STANDARD_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_STANDARD_CLIENT_SECRET }}
          TOAST_OUTLETS: ${{ secrets.TOAST_OUTLETS }}
          TOAST_BASE: ${{ secrets.TOAST_BASE }}
          DAYS_BACK: ${{ github.event.inputs.days || '400' }}
        run: |
          cd toast-etl
          if [ -n "${{ github.event.inputs.outlet }}" ]; then
            python3 toast_sync.py --outlet "${{ github.event.inputs.outlet }}" --outdir ../data
          else
            python3 toast_sync.py --outdir ../data
          fi

      - name: Regenerate dashboard HTML with fresh order_details
        run: |
          python3 toast-etl/regenerate_dashboard.py \
            --data-dir data \
            --html Method_Co_FB_Performance_Dashboard.html

      - name: Commit refreshed data + dashboard
        run: |
          git config user.name  "method-toast-sync[bot]"
          git config user.email "method-toast-sync@users.noreply.github.com"
          git add data/*.json data/_synced_at.txt Method_Co_FB_Performance_Dashboard.html
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "chore(data): nightly Toast sync $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase-and-retry guard against race with guest-sync (which pushes
          # at 03:45 ET, 30 min after we start; if our 2hr+ run overruns
          # into guest-sync's window the naked push gets rejected and the
          # commit is lost). Three attempts with linear backoff.
          for i in 1 2 3; do
            if git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push rejected (attempt $i) — pulling and retrying"
            git pull --rebase origin main || {
              echo "rebase failed; aborting to avoid clobbering remote"
              exit 1
            }
            sleep $((i * 5))
          done
          echo "push failed after 3 attempts"
          exit 1
